<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e17;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: hidden;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: #3b82f6;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 12px;
      color: #64748b;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .progress-track {
      width: 260px;
      height: 3px;
      background: #1a2236;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 2px;
      animation: load 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes load {
      0%   { width: 0%; }
      40%  { width: 55%; }
      70%  { width: 78%; }
      90%  { width: 90%; }
      100% { width: 100%; }
    }

    .status {
      margin-top: 14px;
      font-size: 11px;
      color: #475569;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">
      <span class="logo-name">Zoniq</span>
      <span class="logo-sub">Test Runner</span>
    </div>
  </div>

  <div class="progress-track">
    <div class="progress-bar"></div>
  </div>
  <div class="status">Starting up…</div>
</body>
</html>
