<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e17;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      overflow: hidden;
      border: 1px solid #1e293b;
      border-radius: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 24px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 12px;
      color: #64748b;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .progress-track {
      width: 280px;
      height: 3px;
      background: #1a2236;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #1a2236 0%, #3b82f6 40%, #60a5fa 60%, #1a2236 100%);
      background-size: 280px 100%;
      border-radius: 2px;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { background-position: -280px 0; }
      100% { background-position: 280px 0; }
    }

    .status {
      margin-top: 16px;
      font-size: 11px;
      color: #475569;
      letter-spacing: 0.3px;
      transition: opacity 0.2s ease;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">&#9889;</div>
    <div class="logo-text">
      <span class="logo-name">Zoniq</span>
      <span class="logo-sub">Test Runner</span>
    </div>
  </div>

  <div class="progress-track">
    <div class="progress-bar"></div>
  </div>
  <div class="status">Starting up&#8230;</div>
</body>
</html>
