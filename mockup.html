<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zoniq Test Runner - Redesign Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   RESET & FOUNDATIONS
   ══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Backgrounds ── */
  --bg-base: #06070d;
  --bg-surface: rgba(15, 15, 35, 0.7);
  --bg-elevated: rgba(25, 25, 55, 0.6);
  --bg-glass: rgba(255, 255, 255, 0.04);
  --bg-glass-hover: rgba(255, 255, 255, 0.07);
  --bg-glass-active: rgba(255, 255, 255, 0.10);
  --bg-input: rgba(0, 0, 0, 0.3);

  /* ── Borders ── */
  --border: rgba(255, 255, 255, 0.06);
  --border-subtle: rgba(255, 255, 255, 0.03);
  --border-hover: rgba(255, 255, 255, 0.12);
  --border-glow: rgba(139, 92, 246, 0.4);
  --border-glow-cyan: rgba(6, 182, 212, 0.3);

  /* ── Text ── */
  --text-primary: #f0eef6;
  --text-secondary: #8b8a9e;
  --text-muted: #4a4960;
  --text-inverse: #06070d;

  /* ── Accent Gradients ── */
  --gradient-primary: linear-gradient(135deg, #8b5cf6, #6366f1, #3b82f6);
  --gradient-warm: linear-gradient(135deg, #f472b6, #a855f7);
  --gradient-success: linear-gradient(135deg, #10b981, #34d399);
  --gradient-danger: linear-gradient(135deg, #ef4444, #f87171);
  --gradient-record: linear-gradient(135deg, #ef4444, #dc2626);
  --gradient-cyan: linear-gradient(135deg, #06b6d4, #22d3ee);
  --gradient-amber: linear-gradient(135deg, #f59e0b, #fbbf24);

  /* ── Flat Colors ── */
  --violet: #8b5cf6;
  --cyan: #06b6d4;
  --emerald: #10b981;
  --rose: #f43f5e;
  --amber: #f59e0b;
  --blue: #3b82f6;

  /* ── Glows ── */
  --glow-violet: 0 0 20px rgba(139, 92, 246, 0.25);
  --glow-cyan: 0 0 20px rgba(6, 182, 212, 0.25);
  --glow-emerald: 0 0 20px rgba(16, 185, 129, 0.3);
  --glow-rose: 0 0 20px rgba(244, 63, 94, 0.3);
  --glow-amber: 0 0 20px rgba(245, 158, 11, 0.25);

  /* ── Typography ── */
  --font-display: 'Plus Jakarta Sans', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;

  /* ── Spacing ── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;

  /* ── Radii ── */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-full: 9999px;

  /* ── Shadows ── */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.45);
  --shadow-glow: 0 0 30px rgba(139, 92, 246, 0.12);

  /* ── Transitions ── */
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration: 200ms;
  --duration-slow: 400ms;

  /* ── Layout ── */
  --sidebar-width: 340px;
  --titlebar-height: 56px;
}

html { font-size: 14px; }

body {
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-primary);
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ══════════════════════════════════════════════════════════
   BACKGROUND ATMOSPHERE - Animated gradient orbs + noise
   ══════════════════════════════════════════════════════════ */
.app {
  display: grid;
  grid-template-rows: var(--titlebar-height) 1fr;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* Ambient orbs */
.app::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 600px 500px at 15% 10%, rgba(139, 92, 246, 0.12), transparent),
    radial-gradient(ellipse 500px 400px at 80% 80%, rgba(6, 182, 212, 0.08), transparent),
    radial-gradient(ellipse 400px 350px at 50% 50%, rgba(99, 102, 241, 0.06), transparent);
  animation: drift 20s ease-in-out infinite alternate;
}

/* Subtle noise texture */
.app::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}

@keyframes drift {
  0% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(15px, -10px) scale(1.02); }
  66% { transform: translate(-10px, 15px) scale(0.98); }
  100% { transform: translate(5px, -5px) scale(1.01); }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.08);
  border-radius: var(--radius-full);
}
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* ══════════════════════════════════════════════════════════
   UTILITY: Glass surface mixin
   ══════════════════════════════════════════════════════════ */
.glass {
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
}

/* ══════════════════════════════════════════════════════════
   LAYOUT SHELL
   ══════════════════════════════════════════════════════════ */
.main-layout {
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

.sidebar {
  border-right: 1px solid var(--border);
  background: var(--bg-surface);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  z-index: 2;
}

.detail-panel {
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
  z-index: 1;
  padding: var(--space-8);
}

/* ══════════════════════════════════════════════════════════
   TITLEBAR
   ══════════════════════════════════════════════════════════ */
.titlebar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-5);
  background: var(--bg-surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 10;
  user-select: none;
}

/* Gradient bottom border accent */
.titlebar::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--violet) 30%, var(--cyan) 70%, transparent 100%);
  opacity: 0.4;
}

.titlebar-left {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

/* Animated gradient logo */
.titlebar-logo {
  width: 32px;
  height: 32px;
  background: var(--gradient-primary);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 15px;
  color: white;
  position: relative;
  overflow: hidden;
  box-shadow: var(--glow-violet);
}

.titlebar-logo::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.25) 50%, transparent 60%);
  animation: shimmer 3s ease-in-out infinite;
}

@keyframes shimmer {
  0%, 100% { transform: translateX(-100%); }
  50% { transform: translateX(100%); }
}

.titlebar-brand {
  display: flex;
  align-items: baseline;
  gap: var(--space-2);
}

.titlebar-name {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}

.titlebar-version {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  background: var(--bg-glass);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: var(--radius-full);
}

.titlebar-right {
  display: flex;
  align-items: center;
  gap: var(--space-4);
}

/* Health / Playwright status */
.health-status {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
}

.health-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--emerald);
  box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
  animation: breathe 2s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }
  50% { opacity: 0.7; box-shadow: 0 0 14px rgba(16, 185, 129, 0.7); }
}

/* Settings button */
.btn-settings {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: var(--bg-glass);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--duration) var(--ease-smooth);
}

.btn-settings:hover {
  background: var(--bg-glass-hover);
  border-color: var(--border-hover);
  color: var(--text-primary);
  transform: translateY(-1px);
}

.btn-settings:hover .settings-icon {
  transform: rotate(60deg);
}

.settings-icon {
  transition: transform var(--duration-slow) var(--ease-smooth);
}
</style>
</head>
<body>

<div class="app">
  <!-- TITLEBAR -->
  <header class="titlebar">
    <div class="titlebar-left">
      <div class="titlebar-logo">Z</div>
      <div class="titlebar-brand">
        <span class="titlebar-name">Zoniq</span>
        <span class="titlebar-version">v2.0</span>
      </div>
    </div>
    <div class="titlebar-right">
      <div class="health-status">
        <span class="health-dot"></span>
        <span>Playwright 1.58.2</span>
      </div>
      <button class="btn-settings" title="Settings">
        <svg class="settings-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="main-layout">
    <aside class="sidebar" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px;">
      Sidebar placeholder
    </aside>
    <main class="detail-panel" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px;">
      Detail panel placeholder
    </main>
  </div>
</div>

</body>
</html>
